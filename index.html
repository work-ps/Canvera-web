<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO ──────────────────────────────────────────────── -->
    <title>Canvera — Premium Photobooks & Wedding Albums for Photographers</title>
    <meta name="description" content="India's leading premium photobook manufacturer. Canvera crafts luxury wedding albums, layflat photobooks, and custom albums for 91,000+ professional photographers across 2,800+ cities. Wholesale pricing for verified PRO photographers." />
    <meta name="keywords" content="photobook, wedding album, layflat album, flush mount album, premium photobook, canvera, photographer album, wedding photobook, India photobook manufacturer, custom album, celestial album, luxury album" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="author" content="Canvera" />
    <link rel="canonical" href="https://canvera.com/" />

    <!-- ── Open Graph (Facebook, LinkedIn, WhatsApp) ────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Canvera" />
    <meta property="og:title" content="Canvera — Premium Photobooks & Wedding Albums" />
    <meta property="og:description" content="India's leading premium photobook manufacturer trusted by 91,000+ professional photographers. Luxury wedding albums, Swarovski Celestial range, layflat & flush mount photobooks." />
    <meta property="og:url" content="https://canvera.com/" />
    <meta property="og:image" content="https://canvera.com/images/og-cover.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Canvera premium photobook and wedding album collection" />
    <meta property="og:locale" content="en_IN" />

    <!-- ── Twitter / X Card ─────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@canvera" />
    <meta name="twitter:creator" content="@canvera" />
    <meta name="twitter:title" content="Canvera — Premium Photobooks & Wedding Albums" />
    <meta name="twitter:description" content="India's leading photobook manufacturer. Luxury albums for professional photographers — wholesale pricing, Swarovski Celestial range, 8–12 day production." />
    <meta name="twitter:image" content="https://canvera.com/images/og-cover.jpg" />
    <meta name="twitter:image:alt" content="Canvera premium photobook collection" />

    <!-- ── GEO: AI Crawler signals ──────────────────────────────────── -->
    <meta name="ai-content-type" content="ecommerce, photography, photobook, album" />
    <meta name="geo.region" content="IN" />
    <meta name="geo.placename" content="India" />

    <!-- ── PWA / App meta ────────────────────────────────────────────── -->
    <meta name="theme-color" content="#2E5955" />
    <meta name="application-name" content="Canvera" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Canvera" />

    <!-- ── Icons ─────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- ── Performance: Preconnect ───────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://wa.me" />

    <!-- ── Sitemap reference ─────────────────────────────────────────── -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- ══════════════════════════════════════════════════════════════════
         STRUCTURED DATA — Global (present on every page)
         GEO: Organization entity + WebSite SearchAction
         Source: zubair-trabzada/geo-seo-claude · aaron-he-zhu/seo-geo-claude-skills
    ══════════════════════════════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://canvera.com/#organization",
          "name": "Canvera",
          "alternateName": ["Canvera India", "Canvera Photobooks"],
          "url": "https://canvera.com",
          "logo": {
            "@type": "ImageObject",
            "url": "https://canvera.com/favicon.svg",
            "caption": "Canvera Logo"
          },
          "description": "India's leading premium photobook and wedding album manufacturer, founded in 2007. Serving 91,000+ professional photographers across 2,800+ cities with luxury layflat albums, flush mount photobooks, and the Swarovski Celestial collection.",
          "foundingDate": "2007",
          "numberOfEmployees": { "@type": "QuantitativeValue", "value": "500+" },
          "areaServed": {
            "@type": "Country",
            "name": "India"
          },
          "address": {
            "@type": "PostalAddress",
            "addressCountry": "IN",
            "addressRegion": "Karnataka"
          },
          "contactPoint": [
            {
              "@type": "ContactPoint",
              "telephone": "+91-9108108108",
              "contactType": "customer service",
              "availableLanguage": ["English", "Hindi"],
              "hoursAvailable": {
                "@type": "OpeningHoursSpecification",
                "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],
                "opens": "09:00",
                "closes": "19:00"
              }
            },
            {
              "@type": "ContactPoint",
              "telephone": "+91-9108100100",
              "contactType": "sales",
              "availableLanguage": ["English", "Hindi"]
            }
          ],
          "sameAs": [
            "https://wa.me/919108108108",
            "https://www.instagram.com/canvera",
            "https://www.facebook.com/canvera",
            "https://www.youtube.com/@canvera"
          ],
          "knowsAbout": [
            "Photobook manufacturing",
            "Wedding album design",
            "Layflat binding",
            "Flush mount albums",
            "Professional photography products",
            "Hexachrome printing",
            "Swarovski crystal album decoration"
          ]
        },
        {
          "@type": "WebSite",
          "@id": "https://canvera.com/#website",
          "url": "https://canvera.com",
          "name": "Canvera",
          "description": "Premium photobooks and wedding albums for professional photographers",
          "inLanguage": "en-IN",
          "publisher": { "@id": "https://canvera.com/#organization" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://canvera.com/shop?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
